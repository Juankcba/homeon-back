# ═══════════════════════════════════════════════════════════
# HomeOn - Docker Compose
# ═══════════════════════════════════════════════════════════
# IMPORTANTE: El backend usa network_mode: host para alcanzar
# dispositivos en la LAN (cámaras Tapo, Hue Bridge, MQTT).
#
# Volúmenes compartidos:
#   ai-snapshots  → Python AI engine escribe / NestJS sirve
#   ai-photos     → fotos de caras (NestJS escribe / AI lee)
#   ai-models     → modelos descargados (YOLOv8, EasyOCR) – se cachean
# ═══════════════════════════════════════════════════════════

services:
  # ─── PostgreSQL ─────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: homeon-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USERNAME:-homeon}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?Set DB_PASSWORD in .env}
      POSTGRES_DB: ${DB_DATABASE:-homeon}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./docker/postgres:/docker-entrypoint-initdb.d:ro
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-homeon}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Redis ──────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: homeon-redis
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 128mb --maxmemory-policy allkeys-lru
    volumes:
      - redisdata:/data
    ports:
      - "127.0.0.1:6380:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── NestJS Backend ─────────────────────────────────────
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: homeon-backend
    restart: unless-stopped
    # HOST NETWORK = acceso directo a la LAN (cámaras, Hue, portón)
    network_mode: host
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - .env
    environment:
      DB_HOST: 127.0.0.1
      DB_PORT: 5432
      REDIS_HOST: 127.0.0.1
      REDIS_PORT: 6380
      NODE_ENV: production
      SNAPSHOT_DIR: /snapshots
      PHOTOS_DIR: /data/photos
    volumes:
      - ai-snapshots:/snapshots
      - ai-photos:/data/photos

  # ─── Python AI Engine ───────────────────────────────────
  # Procesa streams RTSP, detecta personas/rostros/patentes y
  # reporta resultados al backend vía HTTP con X-AI-Key.
  #
  # NOTA: La primera vez descarga modelos (~500 MB).
  # El build de la imagen tarda ~10 min por la compilación de dlib.
  ai-engine:
    build:
      context: ../domotic-ai
      dockerfile: Dockerfile
    container_name: homeon-ai
    restart: unless-stopped
    # HOST NETWORK: necesita acceder a las cámaras RTSP en la LAN
    # y también hacer HTTP a localhost:3005 (backend)
    network_mode: host
    depends_on:
      - backend
    environment:
      BACKEND_URL: http://127.0.0.1:3005
      AI_API_KEY: ${AI_API_KEY:-homeon-ai-secret-2026}
      SNAPSHOT_DIR: /snapshots
      FRAME_INTERVAL: ${AI_FRAME_INTERVAL:-5}
      YOLO_CONF: ${AI_YOLO_CONF:-0.45}
      FACE_TOLERANCE: ${AI_FACE_TOLERANCE:-0.55}
      OCR_LANGS: es,en
    volumes:
      - ai-snapshots:/snapshots
      - ai-photos:/data/photos:ro      # AI reads photos (face encodings)
      - ai-models:/root/.cache         # cache YOLOv8 + EasyOCR models

  # ─── Cloudflare Tunnel ──────────────────────────────────
  # Agregar en Cloudflare Zero Trust dashboard:
  #   Public hostname: api.homeone.bladelink.company
  #   Service: http://localhost:3005

volumes:
  pgdata:
    driver: local
  redisdata:
    driver: local
  ai-snapshots:
    driver: local
  ai-photos:
    driver: local
  ai-models:
    driver: local
